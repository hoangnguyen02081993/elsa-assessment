<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Application</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" integrity="sha384-mkQ3/7FUtcGyoppY6bz/PORYoGqOl7/aSUMn2ymDOJcapfS6PHqxhRTMh1RR0Q6+" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <link rel="stylesheet" href="/assets/css/style.css">
  <script src="/assets/scripts/common.js"></script>
</head>
<body>
  <div id="app">
    <!-- Leader Board Page -->
    <div id="leaderboard-page" class="page active">
      <h1>Leader Board</h1>
      <div id="recent-message"></div>
      <table id="leaderboard">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Username</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="leader-board-container"></tbody>
      </table>
      <button onclick="redirectToQuizList()">Back to Quiz List</button>
    </div>
  </div>

  <script src="/assets/scripts/leader-board.js"></script>
</body>
</html>
